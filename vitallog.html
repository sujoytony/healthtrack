<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VitalLog – Health Tracker</title>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VitalLog"/>
<meta name="theme-color" content="#0D1B2A"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{background:#0D1B2A;font-family:'DM Sans',sans-serif;color:#E8F0F7;overflow-x:hidden;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5) sepia(1) saturate(3) hue-rotate(175deg);cursor:pointer;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:99px;}
  .fade{animation:fadeUp 0.22s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const DAILY_GOAL = 2000;
const STORAGE_KEY = "vitallog_v2";

const FOOD_OPTIONS = {
  "Proteins": [
    {id:"full_egg",   name:"Full Egg",      emoji:"🥚", cal:70,  unit:"pc"},
    {id:"egg_white",  name:"Egg White",     emoji:"🍳", cal:17,  unit:"pc"},
    {id:"chicken",    name:"Chicken",       emoji:"🍗", cal:165, unit:"100g"},
    {id:"fish",       name:"Fish",          emoji:"🐟", cal:120, unit:"100g"},
    {id:"tuna",       name:"Tuna",          emoji:"🐡", cal:100, unit:"100g"},
    {id:"tofu",       name:"Tofu",          emoji:"🫘", cal:76,  unit:"100g"},
    {id:"prawns",     name:"Prawns",        emoji:"🦐", cal:85,  unit:"100g"},
  ],
  "Carbs": [
    {id:"rice",       name:"Rice",          emoji:"🍚", cal:45,  unit:"spoon"},
    {id:"bread",      name:"Bread",         emoji:"🍞", cal:80,  unit:"slice"},
    {id:"oats",       name:"Oats",          emoji:"🌾", cal:150, unit:"bowl"},
    {id:"noodles",    name:"Noodles",       emoji:"🍜", cal:220, unit:"bowl"},
    {id:"potato",     name:"Potato",        emoji:"🥔", cal:130, unit:"pc"},
    {id:"chapati",    name:"Chapati/Roti",  emoji:"🫓", cal:100, unit:"pc"},
  ],
  "Healthy": [
    {id:"nuts",       name:"Nuts",          emoji:"🥜", cal:170, unit:"handful"},
    {id:"vegetables", name:"Vegetables",    emoji:"🥦", cal:50,  unit:"cup"},
    {id:"fruits",     name:"Fruits",        emoji:"🍎", cal:80,  unit:"pc"},
    {id:"salad",      name:"Salad",         emoji:"🥗", cal:40,  unit:"bowl"},
    {id:"avocado",    name:"Avocado",       emoji:"🥑", cal:160, unit:"half"},
    {id:"banana",     name:"Banana",        emoji:"🍌", cal:90,  unit:"pc"},
  ],
  "Dairy": [
    {id:"milk",       name:"Milk",          emoji:"🥛", cal:120, unit:"glass"},
    {id:"yogurt",     name:"Yogurt",        emoji:"🫙", cal:100, unit:"cup"},
    {id:"cheese",     name:"Cheese",        emoji:"🧀", cal:110, unit:"slice"},
    {id:"butter",     name:"Butter",        emoji:"🧈", cal:100, unit:"tsp"},
  ],
  "Drinks": [
    {id:"water",      name:"Water",         emoji:"💧", cal:0,   unit:"glass"},
    {id:"coffee",     name:"Coffee",        emoji:"☕", cal:5,   unit:"cup"},
    {id:"juice",      name:"Juice",         emoji:"🍊", cal:110, unit:"glass"},
    {id:"pro_shake",  name:"Protein Shake", emoji:"🥤", cal:150, unit:"scoop"},
    {id:"green_tea",  name:"Green Tea",     emoji:"🍵", cal:2,   unit:"cup"},
  ],
  "Snacks": [
    {id:"biscuits",   name:"Biscuits",      emoji:"🍪", cal:50,  unit:"pc"},
    {id:"chips",      name:"Chips",         emoji:"🥨", cal:140, unit:"pack"},
    {id:"dark_choc",  name:"Dark Choc",     emoji:"🍫", cal:55,  unit:"square"},
    {id:"granola",    name:"Granola Bar",   emoji:"🍫", cal:190, unit:"bar"},
  ],
};

const MEALS = [
  {id:"breakfast",label:"Breakfast",emoji:"🌅",time:"7–9 AM",  color:"#F59E0B"},
  {id:"lunch",    label:"Lunch",    emoji:"☀️",time:"12–2 PM", color:"#10B981"},
  {id:"snacks",   label:"Snacks",   emoji:"🍃",time:"3–5 PM",  color:"#8B5CF6"},
  {id:"dinner",   label:"Dinner",   emoji:"🌙",time:"7–9 PM",  color:"#3B82F6"},
];

const ACTIVITIES = [
  {id:"run",     label:"Run",           emoji:"🏃",unit:"km",  calPerUnit:60,  color:"#EF4444"},
  {id:"walk",    label:"Walk",          emoji:"🚶",unit:"km",  calPerUnit:40,  color:"#F59E0B"},
  {id:"stairs",  label:"Stair Stepping",emoji:"🪜",unit:"min", calPerUnit:8,   color:"#8B5CF6"},
  {id:"plank",   label:"Plank",         emoji:"🧘",unit:"min", calPerUnit:4,   color:"#10B981"},
  {id:"pushups", label:"Push Ups",      emoji:"💪",unit:"reps",calPerUnit:0.5, color:"#3B82F6"},
  {id:"cycling", label:"Cycling",       emoji:"🚴",unit:"km",  calPerUnit:30,  color:"#EC4899"},
  {id:"swimming",label:"Swimming",      emoji:"🏊",unit:"min", calPerUnit:10,  color:"#06B6D4"},
  {id:"yoga",    label:"Yoga",          emoji:"🧘",unit:"min", calPerUnit:3,   color:"#A78BFA"},
  {id:"hiit",    label:"HIIT",          emoji:"🔥",unit:"min", calPerUnit:12,  color:"#FB923C"},
];

const emptyDay = () => ({meals:{breakfast:[],lunch:[],snacks:[],dinner:[]},activities:[],water:0});

const loadAll  = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } };
const saveAll  = (d) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} };

function App() {
  const today = new Date().toISOString().split("T")[0];
  const [allData,  setAllData]  = useState(loadAll);
  const [date,     setDate]     = useState(today);
  const [tab,      setTab]      = useState("food");
  const [mealTab,  setMealTab]  = useState("breakfast");
  const [addingTo, setAddingTo] = useState(null);
  const [actInput, setActInput] = useState({});
  const [foodQty,  setFoodQty]  = useState({});
  const [search,   setSearch]   = useState("");
  const [openCat,  setOpenCat]  = useState(null);
  const [toast,    setToast]    = useState(null);
  const [clearDlg, setClearDlg] = useState(false);

  useEffect(() => { saveAll(allData); }, [allData]);

  const day    = allData[date] || emptyDay();
  const setDay = useCallback((fn) => {
    setAllData(p => ({ ...p, [date]: fn(p[date] || emptyDay()) }));
  }, [date]);

  const totalFood   = Object.values(day.meals).flat().reduce((s,i) => s+i.totalCal, 0);
  const totalBurned = day.activities.reduce((s,a) => s+a.burned, 0);
  const net         = totalFood - totalBurned;
  const pct         = Math.min((totalFood/DAILY_GOAL)*100, 100);
  const mealCals    = (id) => day.meals[id].reduce((s,i) => s+i.totalCal, 0);

  const toast$ = (msg, c="#10B981") => { setToast({msg,c}); setTimeout(()=>setToast(null),2200); };

  const addFood = (mealId, food) => {
    const qty = parseFloat(foodQty[food.id]||1);
    if (!qty||qty<=0) { toast$("Enter a valid quantity","#EF4444"); return; }
    const entry = {...food, qty, totalCal:Math.round(food.cal*qty), uid:`${food.id}-${Date.now()}`};
    setDay(d => ({...d, meals:{...d.meals,[mealId]:[...d.meals[mealId],entry]}}));
    toast$(`${food.emoji} ${food.name} added!`);
    setFoodQty(p => ({...p,[food.id]:""}));
  };

  const removeFood = (mealId, uid) =>
    setDay(d => ({...d, meals:{...d.meals,[mealId]:d.meals[mealId].filter(i=>i.uid!==uid)}}));

  const addAct = (act) => {
    const val = parseFloat(actInput[act.id]||0);
    if (!val||val<=0) { toast$("Enter a valid amount","#EF4444"); return; }
    const burned = Math.round(act.calPerUnit*val);
    setDay(d => ({...d, activities:[...d.activities,{...act,value:val,burned,logId:Date.now()}]}));
    toast$(`${act.emoji} ${act.label} logged! −${burned} kcal`);
    setActInput(p => ({...p,[act.id]:""}));
  };

  const removeAct = (logId) =>
    setDay(d => ({...d, activities:d.activities.filter(a=>a.logId!==logId)}));

  const setWater = (n) => setDay(d => ({...d, water:Math.max(0,n)}));

  const clearDay = () => { setDay(()=>emptyDay()); setClearDlg(false); toast$("Day cleared","#64B5F6"); };

  const allFoods = Object.values(FOOD_OPTIONS).flat();
  const filtered = search.trim() ? allFoods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())) : null;
  const histDates = Object.keys(allData).filter(d=>d!==date).sort().reverse().slice(0,14);

  const S = (ch) => <div style={{fontSize:10,color:"#334155",textTransform:"uppercase",letterSpacing:1,marginBottom:9,marginTop:4}}>{ch}</div>;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0D1B2A 0%,#172539 60%,#0D1B2A 100%)"}}>

      {/* Toast */}
      {toast && <div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",
        background:toast.c,color:"#fff",padding:"10px 22px",borderRadius:99,fontSize:13,
        fontWeight:700,zIndex:9999,boxShadow:"0 6px 24px rgba(0,0,0,0.45)",
        whiteSpace:"nowrap",pointerEvents:"none",animation:"fadeUp 0.2s ease"}}>{toast.msg}</div>}

      {/* HEADER */}
      <div style={{background:"rgba(13,27,42,0.96)",backdropFilter:"blur(24px)",
        borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"14px 16px 13px",
        position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.5px",color:"#fff",lineHeight:1}}>🌿 VitalLog</div>
              <div style={{fontSize:11,color:"#64B5F6",marginTop:3}}>
                {new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}
                {date===today && <span style={{marginLeft:6,background:"#1E3A5F",color:"#64B5F6",fontSize:9,padding:"1px 7px",borderRadius:99,fontWeight:700}}>TODAY</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <input type="date" value={date} onChange={e=>{setDate(e.target.value);setAddingTo(null);}}
                style={{background:"rgba(100,181,246,0.1)",border:"1px solid rgba(100,181,246,0.25)",
                  borderRadius:10,color:"#64B5F6",padding:"6px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}/>
              <button onClick={()=>setClearDlg(true)} title="Clear day"
                style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",
                  borderRadius:9,color:"#EF4444",padding:"6px 10px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
            </div>
          </div>

          {/* Stats row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:11}}>
            {[
              {l:"Eaten",  v:totalFood,   s:"kcal",    c:"#F59E0B"},
              {l:"Burned", v:totalBurned, s:"kcal",    c:"#10B981"},
              {l:"Net",    v:net,         s:"kcal",    c:net>DAILY_GOAL?"#EF4444":"#60A5FA"},
              {l:"Water",  v:day.water,   s:"glasses", c:"#06B6D4"},
            ].map(s=>(
              <div key={s.l} style={{background:"rgba(255,255,255,0.05)",borderRadius:10,
                padding:"8px 5px",textAlign:"center",border:`1px solid ${s.c}1A`}}>
                <div style={{fontSize:17,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
                <div style={{fontSize:9,color:"#475569",marginTop:2,textTransform:"uppercase",letterSpacing:0.4}}>{s.s}</div>
                <div style={{fontSize:9,color:"#334155",marginTop:1}}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:10,color:"#334155"}}>Goal: {DAILY_GOAL} kcal</span>
              <span style={{fontSize:10,color:pct>=100?"#EF4444":pct>=80?"#F59E0B":"#475569"}}>{Math.round(pct)}%</span>
            </div>
            <div style={{height:5,background:"rgba(255,255,255,0.06)",borderRadius:99,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,borderRadius:99,transition:"width 0.6s ease",
                background:pct>=100?"linear-gradient(90deg,#F59E0B,#EF4444)":
                           pct>=80 ?"linear-gradient(90deg,#F59E0B,#10B981)":
                                    "linear-gradient(90deg,#10B981,#3B82F6)"}}/>
            </div>
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:520,margin:"0 auto",padding:"0 14px",paddingBottom:88}}>

        {/* Tab bar */}
        <div style={{display:"flex",gap:5,marginTop:15,marginBottom:16,
          background:"rgba(255,255,255,0.04)",borderRadius:14,padding:4}}>
          {[{id:"food",ico:"🍽",l:"Food"},{id:"activity",ico:"🏋️",l:"Activity"},
            {id:"summary",ico:"📊",l:"Summary"},{id:"history",ico:"📅",l:"History"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"9px 0",borderRadius:11,border:"none",cursor:"pointer",
                fontSize:11,fontWeight:700,transition:"all 0.2s",fontFamily:"inherit",
                background:tab===t.id?"linear-gradient(135deg,#1E3A5F,#2563EB)":"transparent",
                color:tab===t.id?"#fff":"#475569",
                boxShadow:tab===t.id?"0 4px 14px rgba(37,99,235,0.3)":"none"}}>
              {t.ico} {t.l}
            </button>
          ))}
        </div>

        {/* ══ FOOD TAB ══ */}
        {tab==="food" && <div className="fade">
          {/* Water */}
          <div style={{background:"rgba(6,182,212,0.07)",border:"1px solid rgba(6,182,212,0.18)",
            borderRadius:16,padding:"12px 14px",marginBottom:13,
            display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"#06B6D4"}}>💧 Water</div>
              <div style={{display:"flex",gap:3,marginTop:5,flexWrap:"wrap"}}>
                {[...Array(8)].map((_,i)=>(
                  <div key={i} onClick={()=>setWater(i<day.water?i:i+1)}
                    style={{width:14,height:14,borderRadius:3,cursor:"pointer",
                      background:i<day.water?"#06B6D4":"rgba(6,182,212,0.12)",
                      transition:"background 0.2s",border:"1px solid rgba(6,182,212,0.2)"}}/>
                ))}
              </div>
              <div style={{fontSize:10,color:"#334155",marginTop:4}}>{day.water}/8 glasses</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setWater(day.water-1)} style={circBtn("#06B6D4")}>−</button>
              <span style={{fontSize:26,fontWeight:800,color:"#06B6D4",minWidth:28,textAlign:"center"}}>{day.water}</span>
              <button onClick={()=>setWater(day.water+1)} style={circBtn("#06B6D4")}>+</button>
            </div>
          </div>

          {/* Meal selector */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:13}}>
            {MEALS.map(m=>(
              <button key={m.id} onClick={()=>{setMealTab(m.id);setAddingTo(null);setSearch("");}}
                style={{padding:"11px 12px",borderRadius:14,cursor:"pointer",textAlign:"left",
                  fontFamily:"inherit",transition:"all 0.2s",
                  border:`1px solid ${mealTab===m.id?m.color+"55":"rgba(255,255,255,0.06)"}`,
                  background:mealTab===m.id?`${m.color}12`:"rgba(255,255,255,0.03)"}}>
                <div style={{fontSize:20,marginBottom:2}}>{m.emoji}</div>
                <div style={{fontSize:13,fontWeight:700,color:mealTab===m.id?m.color:"#CBD5E1"}}>{m.label}</div>
                <div style={{fontSize:10,color:"#475569"}}>{m.time} · <span style={{color:mealTab===m.id?m.color:"#64748B",fontWeight:600}}>{mealCals(m.id)} kcal</span></div>
              </button>
            ))}
          </div>

          {/* Active meal panel */}
          {MEALS.filter(m=>m.id===mealTab).map(meal=>(
            <div key={meal.id} style={{background:"rgba(255,255,255,0.025)",
              border:`1px solid ${meal.color}2A`,borderRadius:20,padding:15}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:15,fontWeight:800,color:meal.color}}>{meal.emoji} {meal.label}</span>
                <span style={{fontSize:11,background:`${meal.color}16`,color:meal.color,
                  padding:"3px 10px",borderRadius:99,fontWeight:700}}>{mealCals(meal.id)} kcal</span>
              </div>

              {/* Logged items */}
              {day.meals[meal.id].length===0
                ? <div style={{textAlign:"center",padding:"14px 0",color:"#2D4059",fontSize:13}}>Nothing logged yet</div>
                : <div style={{marginBottom:12}}>
                    {day.meals[meal.id].map(item=>(
                      <div key={item.uid} style={{display:"flex",justifyContent:"space-between",
                        alignItems:"center",padding:"8px 10px",
                        background:"rgba(255,255,255,0.04)",borderRadius:10,marginBottom:5}}>
                        <span style={{fontSize:13}}>{item.emoji} {item.name}</span>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:11,color:"#475569"}}>×{item.qty} {item.unit}</span>
                          <span style={{fontSize:12,fontWeight:700,color:meal.color}}>{item.totalCal}</span>
                          <button onClick={()=>removeFood(meal.id,item.uid)}
                            style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:17,padding:0,lineHeight:1,fontFamily:"inherit"}}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
              }

              {/* Food picker */}
              {addingTo===meal.id ? (
                <div>
                  <input placeholder="🔍 Search food…" value={search} onChange={e=>setSearch(e.target.value)}
                    style={{width:"100%",background:"rgba(255,255,255,0.07)",
                      border:"1px solid rgba(255,255,255,0.1)",borderRadius:11,
                      color:"#fff",padding:"10px 14px",fontSize:13,marginBottom:11,
                      fontFamily:"inherit",outline:"none"}}/>

                  {filtered ? (
                    filtered.length===0
                      ? <div style={{textAlign:"center",padding:"16px 0",color:"#334155",fontSize:13}}>No results</div>
                      : filtered.map(food=><FRow key={food.id} food={food} meal={meal} foodQty={foodQty} setFoodQty={setFoodQty} addFood={addFood}/>)
                  ) : (
                    Object.entries(FOOD_OPTIONS).map(([cat,foods])=>{
                      const open = openCat===cat;
                      return (
                        <div key={cat} style={{marginBottom:7}}>
                          <button onClick={()=>setOpenCat(open?null:cat)}
                            style={{width:"100%",background:"rgba(255,255,255,0.05)",
                              border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,
                              color:"#94A3B8",padding:"9px 12px",fontSize:12,fontWeight:600,
                              cursor:"pointer",textAlign:"left",fontFamily:"inherit",
                              display:"flex",justifyContent:"space-between",alignItems:"center",
                              marginBottom:open?6:0}}>
                            {cat} <span style={{fontSize:10,color:"#475569"}}>{open?"▲":"▼"}</span>
                          </button>
                          {open && foods.map(food=><FRow key={food.id} food={food} meal={meal} foodQty={foodQty} setFoodQty={setFoodQty} addFood={addFood}/>)}
                        </div>
                      );
                    })
                  )}

                  <button onClick={()=>{setAddingTo(null);setSearch("");setOpenCat(null);}}
                    style={{width:"100%",padding:10,background:"rgba(255,255,255,0.04)",
                      border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,
                      color:"#64748B",fontSize:13,cursor:"pointer",marginTop:8,fontFamily:"inherit"}}>
                    ✕ Done
                  </button>
                </div>
              ) : (
                <button onClick={()=>{setAddingTo(meal.id);setSearch("");setOpenCat(null);}}
                  style={{width:"100%",padding:11,background:`${meal.color}10`,
                    border:`1px dashed ${meal.color}44`,borderRadius:12,
                    color:meal.color,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  + Add Food
                </button>
              )}
            </div>
          ))}
        </div>}

        {/* ══ ACTIVITY TAB ══ */}
        {tab==="activity" && <div className="fade">
          <div style={{fontSize:12,color:"#334155",marginBottom:13}}>Log activities for {date===today?"today":date}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {ACTIVITIES.map(act=>(
              <div key={act.id} style={{background:"rgba(255,255,255,0.03)",
                border:`1px solid ${act.color}2A`,borderRadius:16,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:24}}>{act.emoji}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#E2E8F0"}}>{act.label}</div>
                      <div style={{fontSize:10,color:"#475569"}}>{act.calPerUnit} kcal/{act.unit}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" min="0" step="0.5" placeholder="0"
                      value={actInput[act.id]||""}
                      onChange={e=>setActInput(p=>({...p,[act.id]:e.target.value}))}
                      style={{width:52,background:"rgba(255,255,255,0.08)",
                        border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,
                        color:"#fff",padding:"6px 8px",fontSize:13,textAlign:"center",fontFamily:"inherit"}}/>
                    <span style={{fontSize:10,color:"#475569",minWidth:22}}>{act.unit}</span>
                    <button onClick={()=>addAct(act)}
                      style={{background:`${act.color}1A`,border:`1px solid ${act.color}44`,
                        borderRadius:9,color:act.color,padding:"7px 13px",
                        fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      Log
                    </button>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {day.activities.length>0 && <div>
            <div style={{fontSize:10,color:"#334155",textTransform:"uppercase",letterSpacing:1,marginBottom:9}}>✅ Logged</div>
            {day.activities.map(a=>(
              <div key={a.logId} style={{display:"flex",justifyContent:"space-between",
                alignItems:"center",padding:"10px 13px",
                background:`${a.color}0E`,border:`1px solid ${a.color}2A`,
                borderRadius:12,marginBottom:7}}>
                <span style={{fontSize:13}}>{a.emoji} {a.label}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:12,color:"#64748B"}}>{a.value} {a.unit}</span>
                  <span style={{fontSize:13,fontWeight:800,color:"#10B981"}}>−{a.burned} kcal</span>
                  <button onClick={()=>removeAct(a.logId)}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:17,padding:0,fontFamily:"inherit"}}>×</button>
                </div>
              </div>
            ))}
            <div style={{textAlign:"right",padding:"9px 13px",fontSize:14,fontWeight:800,color:"#10B981"}}>
              🔥 Total: {totalBurned} kcal
            </div>
          </div>}
        </div>}

        {/* ══ SUMMARY TAB ══ */}
        {tab==="summary" && <div className="fade">
          {/* Hero */}
          <div style={{background:"linear-gradient(135deg,rgba(37,99,235,0.16),rgba(16,185,129,0.16))",
            border:"1px solid rgba(37,99,235,0.28)",borderRadius:22,padding:20,
            marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:10,color:"#64748B",textTransform:"uppercase",letterSpacing:1}}>Net Calories</div>
            <div style={{fontSize:58,fontWeight:900,letterSpacing:-2,lineHeight:1.05,margin:"6px 0",
              color:net>DAILY_GOAL?"#EF4444":"#60A5FA"}}>{net}</div>
            <div style={{fontSize:11,color:"#475569"}}>
              {DAILY_GOAL-net>0?`${DAILY_GOAL-net} kcal remaining`:`${net-DAILY_GOAL} kcal over goal`}
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:22,marginTop:14}}>
              {[{v:totalFood,l:"Consumed",c:"#F59E0B"},{v:totalBurned,l:"Burned",c:"#10B981"},{v:net,l:"Net",c:"#60A5FA"},{v:day.water,l:"💧 Water",c:"#06B6D4"}].map(s=>(
                <div key={s.l} style={{textAlign:"center"}}>
                  <div style={{fontSize:17,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:9,color:"#475569"}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Meals */}
          {S("Meals Breakdown")}
          {MEALS.map(m=>{
            const cals=mealCals(m.id), p=totalFood>0?(cals/totalFood)*100:0;
            return (
              <div key={m.id} style={{background:"rgba(255,255,255,0.025)",borderRadius:14,
                padding:"11px 13px",marginBottom:7,border:`1px solid ${m.color}1A`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:13,fontWeight:700}}>{m.emoji} {m.label}</span>
                  <span style={{fontSize:13,fontWeight:800,color:m.color}}>{cals} kcal</span>
                </div>
                <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:99}}>
                  <div style={{height:"100%",width:`${p}%`,background:m.color,borderRadius:99,transition:"width 0.5s"}}/>
                </div>
                {day.meals[m.id].length>0 && (
                  <div style={{marginTop:6,fontSize:10,color:"#475569",lineHeight:1.7}}>
                    {day.meals[m.id].map(i=>`${i.emoji} ${i.name} (${i.totalCal} kcal)`).join("  ·  ")}
                  </div>
                )}
              </div>
            );
          })}

          {/* Activities */}
          {day.activities.length>0 && <div style={{marginBottom:14}}>
            {S("Activities")}
            <div style={{background:"rgba(16,185,129,0.07)",border:"1px solid rgba(16,185,129,0.18)",borderRadius:14,padding:13}}>
              {day.activities.map(a=>(
                <div key={a.logId} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}}>
                  <span>{a.emoji} {a.label} — {a.value} {a.unit}</span>
                  <span style={{color:"#10B981",fontWeight:700}}>−{a.burned} kcal</span>
                </div>
              ))}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:7,paddingTop:7,
                display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:800}}>
                <span>Total Burned</span><span style={{color:"#10B981"}}>−{totalBurned} kcal</span>
              </div>
            </div>
          </div>}

          {/* Insight */}
          <div style={{background:"rgba(139,92,246,0.07)",border:"1px solid rgba(139,92,246,0.2)",borderRadius:14,padding:"13px 15px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#A78BFA",marginBottom:5}}>💡 Daily Insight</div>
            <div style={{fontSize:12,color:"#94A3B8",lineHeight:1.7}}>
              {totalFood===0?"Start logging meals to see your insight."
                :net<1200?"⚠️ Calorie intake is low. Make sure you're eating enough."
                :net>DAILY_GOAL?`You're ${net-DAILY_GOAL} kcal over your goal. A walk or activity can help.`
                :`✅ On track! ${DAILY_GOAL-net} kcal remaining for the day.`}
            </div>
            {day.water<8 && <div style={{marginTop:7,fontSize:11,color:"#67E8F9"}}>💧 {day.water}/8 glasses. Stay hydrated!</div>}
          </div>
        </div>}

        {/* ══ HISTORY TAB ══ */}
        {tab==="history" && <div className="fade">
          {S("Past Logs")}
          {histDates.length===0
            ? <div style={{textAlign:"center",padding:"40px 0",color:"#2D4059",fontSize:14}}>No past data yet.<br/>Start logging today!</div>
            : histDates.map(d=>{
                const dx = allData[d]||emptyDay();
                const fc = Object.values(dx.meals).flat().reduce((s,i)=>s+i.totalCal,0);
                const bc = dx.activities.reduce((s,a)=>s+a.burned,0);
                const nc = fc-bc, p=Math.min((fc/DAILY_GOAL)*100,100);
                return (
                  <div key={d} onClick={()=>{setDate(d);setTab("summary");}}
                    style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",
                      borderRadius:16,padding:"13px 15px",marginBottom:9,cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:"#CBD5E1"}}>
                          {new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
                        </div>
                        <div style={{fontSize:10,color:"#475569",marginTop:2}}>{dx.activities.map(a=>a.emoji).join(" ")||"No activities"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:15,fontWeight:800,color:nc>DAILY_GOAL?"#EF4444":"#60A5FA"}}>{nc} <span style={{fontSize:10,fontWeight:400,color:"#475569"}}>net</span></div>
                        <div style={{fontSize:10,color:"#475569",marginTop:2}}>💧{dx.water} · 🔥{bc} burned</div>
                      </div>
                    </div>
                    <div style={{height:3,background:"rgba(255,255,255,0.05)",borderRadius:99}}>
                      <div style={{height:"100%",width:`${p}%`,borderRadius:99,
                        background:p>=100?"linear-gradient(90deg,#F59E0B,#EF4444)":"linear-gradient(90deg,#10B981,#3B82F6)"}}/>
                    </div>
                  </div>
                );
              })
          }
        </div>}

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,
        background:"rgba(13,27,42,0.97)",backdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,0.07)",
        padding:"8px 0 max(8px,env(safe-area-inset-bottom))"}}>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
          {[{id:"food",ico:"🍽",l:"Food"},{id:"activity",ico:"🏋️",l:"Activity"},
            {id:"summary",ico:"📊",l:"Summary"},{id:"history",ico:"📅",l:"History"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                padding:"6px 0",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <span style={{fontSize:20}}>{t.ico}</span>
              <span style={{fontSize:9,fontWeight:700,letterSpacing:0.3,
                color:tab===t.id?"#60A5FA":"#334155"}}>{t.l}</span>
              {tab===t.id && <div style={{width:18,height:2,background:"#2563EB",borderRadius:99,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>

      {/* Clear Day confirm */}
      {clearDlg && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,
          display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#172539",border:"1px solid rgba(239,68,68,0.3)",
            borderRadius:20,padding:24,maxWidth:320,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:10}}>🗑</div>
            <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>Clear this day?</div>
            <div style={{fontSize:12,color:"#64748B",marginBottom:20}}>
              All data for {date===today?"today":date} will be permanently deleted.
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setClearDlg(false)}
                style={{flex:1,padding:11,background:"rgba(255,255,255,0.05)",
                  border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,
                  color:"#94A3B8",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Cancel</button>
              <button onClick={clearDay}
                style={{flex:1,padding:11,background:"rgba(239,68,68,0.15)",
                  border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,
                  color:"#EF4444",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Clear</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function FRow({food,meal,foodQty,setFoodQty,addFood}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
      background:"rgba(255,255,255,0.04)",borderRadius:10,marginBottom:5}}>
      <input type="number" min="0.5" step="0.5" placeholder="qty"
        value={foodQty[food.id]||""}
        onChange={e=>setFoodQty(p=>({...p,[food.id]:e.target.value}))}
        style={{width:48,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:7,color:"#fff",padding:"5px 7px",fontSize:12,textAlign:"center",fontFamily:"inherit"}}/>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600}}>{food.emoji} {food.name}</div>
        <div style={{fontSize:10,color:"#475569"}}>{food.cal} kcal / {food.unit}</div>
      </div>
      <button onClick={()=>addFood(meal.id,food)}
        style={{background:`${meal.color}1A`,border:`1px solid ${meal.color}44`,
          borderRadius:9,color:meal.color,padding:"7px 14px",
          fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
        Add
      </button>
    </div>
  );
}

const circBtn = (c) => ({
  width:32,height:32,borderRadius:"50%",border:`1px solid ${c}33`,
  background:`${c}12`,color:c,fontSize:20,cursor:"pointer",padding:0,
  display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",lineHeight:1
});

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
